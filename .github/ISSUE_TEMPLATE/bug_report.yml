name: Bug Report
description: Report a bug in porkbun-cli or porkbun-sdk
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `porkbun dns list example.com`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - porkbun-cli
        - porkbun-sdk
        - Both
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `porkbun version` or package version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.11.0"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
